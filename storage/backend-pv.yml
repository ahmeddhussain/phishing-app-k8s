apiVersion: v1
kind: PersistentVolume
metadata:
  name: backend-pv   
  namespace: project                                 
spec:
  storageClassName: ""
  capacity:
    storage: 1Gi                   
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce                 
  persistentVolumeReclaimPolicy: Retain 
  hostPath:                         
    path: /mnt/data/backend-storage       
