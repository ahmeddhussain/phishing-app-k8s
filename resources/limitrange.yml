apiVersion: v1
kind: LimitRange
metadata:
  name: project-limit-range
  namespace: project
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "100m"                      
      memory: "256Mi"                  
    default:
      cpu: "500m"                      
      memory: "512Mi"                  
    min:
      cpu: "50m"                       
      memory: "64Mi"                   
    max:
      cpu: "2"                         
      memory: "2Gi"                    
