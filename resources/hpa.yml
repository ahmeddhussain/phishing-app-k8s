apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: phishing-app-hpa
  namespace: project
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: phishing-back  # can do the same for phishing-front
  minReplicas: 2                      
  maxReplicas: 10            
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60        
